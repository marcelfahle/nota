name: CI

on:
  pull_request:
    paths:
      - ".github/**"
      - "docs/**"
      - "nota/**"
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "docs/**"
      - "nota/**"

jobs:
  nota:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nota
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun test

      - name: Static checks
        run: bun run check

      - name: Build
        run: bun run build

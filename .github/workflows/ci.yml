name: CI

on:
  pull_request:
    paths:
      - ".github/**"
      - "docs/**"
      - "apps/**"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "docs/**"
      - "apps/**"
      - "package.json"
      - "bun.lock"

jobs:
  monorepo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Web unit tests
        run: bun run test:web

      - name: Web static checks
        run: bun run check:web

      - name: CLI static checks
        run: bun run check:cli

      - name: MCP static checks
        run: bun run check:mcp

      - name: Web build
        run: bun run build:web
